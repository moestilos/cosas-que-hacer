<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="tg" x1="80" y1="0" x2="280" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e0ff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <text x="50%" y="50%"
        dominant-baseline="central" text-anchor="middle"
        font-family="'Inter','SF Pro Display',system-ui,sans-serif"
        font-size="28" font-weight="900"
        fill="white" letter-spacing="-1">Mo.</text>

  <!-- Wordmark -->
  <text x="80" y="42"
        font-family="'Inter','SF Pro Display',system-ui,sans-serif"
        font-size="34" font-weight="900" letter-spacing="-1.2"
        fill="url(#tg)">Moe</text>

  <text x="173" y="42"
        font-family="'Inter','SF Pro Display',system-ui,sans-serif"
        font-size="34" font-weight="900" letter-spacing="-1.2"
        fill="#7c3aed">PDF</text>

  <text x="82" y="57"
        font-family="'Inter','SF Pro Display',system-ui,sans-serif"
        font-size="10.5" font-weight="500" letter-spacing="3.5"
        fill="#6366f1" opacity="0.6">PRESUPUESTOS PRO</text>
</svg>
